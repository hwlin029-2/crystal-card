<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Noto Serif TC','Noto Sans TC',serif;
  background:linear-gradient(180deg,#fef9f4 0%,#fdf2e9 30%,#fce8dc 60%,#fdf2e9 100%);
  display:flex;flex-direction:column;align-items:center;
  position:relative;min-height:100vh;
}

/* Particles */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:floatUp var(--dur) ease-in-out var(--delay) infinite}

/* Animations */
@keyframes floatUp{0%,100%{transform:translateY(0) scale(1);opacity:.2}50%{transform:translateY(-30px) scale(1.3);opacity:.5}}
@keyframes shimmer{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}
@keyframes cardIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes cardShuffle{0%{transform:scale(.8) rotateY(180deg);opacity:0}60%{transform:scale(1.05) rotateY(0);opacity:1}100%{transform:scale(1) rotateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes cardReveal{0%{transform:scale(.3) rotateY(90deg);opacity:0}50%{transform:scale(1.08) rotateY(0);opacity:1}100%{transform:scale(1) rotateY(0);opacity:1}}
@keyframes gentlePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes sparkleIn{from{opacity:0;transform:scale(0) rotate(-30deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes igGlow{0%,100%{box-shadow:0 0 8px rgba(212,165,116,.15)}50%{box-shadow:0 0 18px rgba(212,165,116,.35)}}

/* Header */
.header{position:relative;z-index:1;text-align:center;padding:50px 24px 10px;width:100%;max-width:420px}
.sparkles{display:flex;justify-content:center;gap:14px;margin-bottom:14px}
.sparkle-icon{color:#d4a574;opacity:.6}
.sparkle-icon:nth-child(1){animation:sparkleIn .5s ease .2s both,gentlePulse 2s ease-in-out 0s infinite;width:12px;height:12px}
.sparkle-icon:nth-child(2){animation:sparkleIn .5s ease .35s both,gentlePulse 2s ease-in-out .4s infinite;width:18px;height:18px}
.sparkle-icon:nth-child(3){animation:sparkleIn .5s ease .5s both,gentlePulse 2s ease-in-out .8s infinite;width:12px;height:12px}
h1{font-size:24px;font-weight:700;color:#7a5c3e;letter-spacing:4px;animation:titleFloat 4s ease-in-out infinite;margin-bottom:6px}
.subtitle{font-size:12px;color:#b8956e;letter-spacing:2px}

/* Promo banner */
.promo{position:relative;z-index:1;text-align:center;margin:14px 0 4px;width:100%;max-width:360px;padding:0 20px}
.promo-inner{background:linear-gradient(135deg,rgba(212,165,116,.08) 0%,rgba(232,180,200,.1) 100%);border:1px solid rgba(212,165,116,.2);border-radius:16px;padding:14px 20px}
.promo-title{font-size:16px;font-weight:700;color:#9b734a;letter-spacing:3px;margin-bottom:4px}
.promo-sub{font-size:12px;color:#b8956e;letter-spacing:1px;font-style:italic}

/* Pick hint */
.pick-hint{position:relative;z-index:1;text-align:center;margin:16px 0 14px}
.pick-badge{display:inline-block;padding:7px 22px;border-radius:50px;background:rgba(212,165,116,.12);border:1px solid rgba(212,165,116,.25);color:#9b734a;font-size:13px;letter-spacing:3px;font-weight:500}

/* Card grid */
.card-area{position:relative;z-index:1;width:100%;max-width:360px;padding:0 24px}
.card-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}

/* Card back */
.card-back{
  width:calc((100% - 24px)/3);aspect-ratio:2/3;border-radius:16px;
  border:1.5px solid rgba(212,165,116,.4);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:0 2px 12px rgba(212,165,116,.15);
}
.card-back .shimmer-layer{
  position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.3) 50%,transparent 70%);
}
.card-back .inner-border{
  position:absolute;inset:7px;border:1px solid rgba(212,165,116,.2);
  border-radius:10px;pointer-events:none;
}
.card-back .card-label{font-size:10px;color:#c9956a;letter-spacing:3px;font-weight:500;position:relative;z-index:1}
.card-back .card-sparkle{position:relative;z-index:1;margin-bottom:6px;color:#c9956a;opacity:.5}

/* Overlay */
.overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);animation:fadeIn .3s ease}
.overlay.hidden{display:none}

/* Revealed card */
.revealed-card{
  width:min(320px,85vw);border-radius:24px;
  border:2px solid rgba(212,165,116,.5);
  box-shadow:0 20px 60px rgba(0,0,0,.25),0 0 40px rgba(212,165,116,.15);
  overflow:hidden;animation:cardReveal .7s cubic-bezier(.34,1.56,.64,1);position:relative;
}
.revealed-card .shine{position:absolute;inset:0;background:linear-gradient(135deg,transparent 20%,rgba(255,255,255,.2) 45%,transparent 55%);pointer-events:none}
.revealed-card .frame{position:absolute;inset:12px;border-radius:14px;pointer-events:none}
.revealed-card .content{position:relative;z-index:1;padding:36px 26px 32px;text-align:center}
.revealed-card .tag{font-size:10px;letter-spacing:4px;margin-bottom:14px}
.revealed-card .icon-circle{
  display:inline-flex;width:66px;height:66px;border-radius:50%;
  align-items:center;justify-content:center;margin-bottom:18px;
  animation:gentlePulse 2s ease-in-out infinite;
}
.revealed-card .icon-circle span{font-size:30px}
.revealed-card .crystal-name{font-size:26px;font-weight:700;letter-spacing:4px;margin-bottom:6px}
.revealed-card .crystal-keyword{font-size:13px;letter-spacing:3px;margin-bottom:20px}
.revealed-card .divider{width:36px;height:1px;margin:0 auto 20px}
.revealed-card .crystal-text{font-size:14.5px;line-height:1.9;letter-spacing:.5px}
.revealed-card .btn-close{
  margin-top:28px;padding:11px 26px;border-radius:50px;
  font-size:13px;font-weight:500;cursor:pointer;letter-spacing:2px;
  font-family:'Noto Serif TC',serif;
}

/* Footer */
.footer{position:relative;z-index:1;text-align:center;margin-top:auto;padding:36px 0 28px;width:100%}
.footer-line{width:40px;height:1px;background:rgba(212,165,116,.3);margin:0 auto 18px}
.ig-link{
  display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:50px;
  background:linear-gradient(135deg,rgba(212,165,116,.1) 0%,rgba(232,180,200,.12) 100%);
  border:1px solid rgba(212,165,116,.25);text-decoration:none;color:#9b734a;
  animation:igGlow 3s ease-in-out infinite;
}
.ig-link span{font-size:13px;font-weight:500;letter-spacing:1px;font-family:'Noto Serif TC',serif}
.footer-tag{margin-top:10px;font-size:11px;color:#c9a87c;letter-spacing:1px;opacity:.7}
</style>

let currentCards=[];
let phase="idle";

function pickUnique(arr,n){
  const s=[...arr].sort(()=>Math.random()-.5);
  const p=[],u=new Set();
  for(const c of s){if(u.has(c.name))continue;u.add(c.name);p.push(c);if(p.length>=n)break;}
  return p.sort(()=>Math.random()-.5);
}

function createParticles(){
  const el=document.getElementById("particles");
  for(let i=0;i<24;i++){
    const d=document.createElement("div");d.className="particle";
    const sz=2+Math.random()*4;
    const colors=["#d4a574","#e8b4c8","#ffffff"];
    d.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${colors[i%3]};opacity:${.12+Math.random()*.25};--dur:${4+Math.random()*4}s;--delay:${Math.random()*6}s`;
    el.appendChild(d);
  }
}

function renderCards(shuffle){
  currentCards=pickUnique(CRYSTALS,6);
  const grid=document.getElementById("cardGrid");
  grid.innerHTML="";
  currentCards.forEach((c,i)=>{
    const card=document.createElement("div");
    card.className="card-back";
    card.style.background=BACK_BGS[i%3];
    card.style.animation=shuffle?`cardShuffle .6s ease ${i*.08}s both`:`cardIdle 3s ease-in-out ${i*.3}s infinite`;
    card.innerHTML=`<div class="shimmer-layer" style="animation:shimmer 3s ease-in-out ${i*.5}s infinite"></div><div class="inner-border"></div><svg class="card-sparkle" width="16" height="16" viewBox="0 0 12 12"><path d="M6 0L7.2 4.8L12 6L7.2 7.2L6 12L4.8 7.2L0 6L4.8 4.8Z" fill="currentColor"/></svg><div class="card-label">水晶</div>`;
    card.onclick=()=>pickCard(i);
    grid.appendChild(card);
    if(shuffle)setTimeout(()=>{card.style.animation=`cardIdle 3s ease-in-out ${i*.3}s infinite`;},800);
  });
}

function pickCard(idx){
  if(phase!=="idle")return;
  phase="revealing";
  const c=currentCards[idx];
  const isDark=c.name==="黑曜石"||c.name==="黑碧璽";
  const tc=isDark?"#fff":"#4a3728";
  const sc=isDark?"rgba(255,255,255,.75)":"#8b7355";
  const nc=isDark?"#ffd700":"#9b734a";
  const ab=isDark?"rgba(255,215,0,.2)":"rgba(212,165,116,.3)";
  const bc=isDark?"rgba(255,215,0,.4)":"rgba(212,165,116,.5)";

  const card=document.getElementById("revealedCard");
  card.style.background=c.gradient;
  card.innerHTML=`
    <div class="shine"></div>
    <div class="frame" style="border:1.5px solid ${ab}"></div>
    <div class="content">
      <div class="tag" style="color:${sc}">── 你的水晶 ──</div>
      <div class="icon-circle" style="background:${isDark?"rgba(255,215,0,.15)":"rgba(212,165,116,.15)"};border:1px solid ${ab}">
        <span style="color:${nc}">${c.emoji}</span>
      </div>
      <div class="crystal-name" style="color:${nc}">${c.name}</div>
      <div class="crystal-keyword" style="color:${isDark?"rgba(255,215,0,.7)":"#c9956a"}">${c.keyword}</div>
      <div class="divider" style="background:${isDark?"rgba(255,215,0,.3)":"rgba(212,165,116,.4)"}"></div>
      <div class="crystal-text" style="color:${tc}">${c.text}</div>
      <button class="btn-close" style="border:1.5px solid ${bc};background:${isDark?"rgba(255,215,0,.1)":"rgba(255,255,255,.6)"};color:${nc}" onclick="event.stopPropagation();closeCard()">收下祝福 ✧</button>
    </div>`;

  const overlay=document.getElementById("overlay");
  overlay.classList.remove("hidden");
  phase="revealed";
}

function closeCard(){
  document.getElementById("overlay").classList.add("hidden");
  phase="idle";
  renderCards(true);
}

createParticles();
renderCards(false);
</script>
</body>
</html>
